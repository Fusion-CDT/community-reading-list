name: Convert edit suggestion to PR
on:
  issues:
    types: [opened]

jobs:
  apply-edit:
    if: |
      contains(github.event.issue.labels.*.name, 'edit-literature') ||
      contains(github.event.issue.labels.*.name, 'edit-tutorial')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract filepath from issue title
        id: extract
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          FILEPATH="${TITLE#Edit: }"
          echo "filepath=${FILEPATH}" >> $GITHUB_OUTPUT

      - name: Determine issue template
        id: template
        run: |
          if [[ "${{ contains(github.event.issue.labels.*.name, 'edit-literature') }}" == "true" ]]; then
            echo "file=edit-literature.yml" >> $GITHUB_OUTPUT
          else
            echo "file=edit-tutorial.yml" >> $GITHUB_OUTPUT
          fi

      - name: Parse issue
        id: parser
        uses: issue-ops/parser@v5.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: ${{ steps.template.outputs.file }}

      - name: Validate filepath
        env:
          FILEPATH: ${{ steps.extract.outputs.filepath }}
        run: |
          if [ ! -f "${FILEPATH}" ]; then
            echo "::error::File '${FILEPATH}' not found in repository."
            exit 1
          fi

      - name: Apply edit to file
        env:
          FILEPATH: ${{ steps.extract.outputs.filepath }}
          PROPOSED_CONTENT: ${{ steps.parser.outputs.parsed_proposed_content }}
          CONTRIBUTOR_NAME: ${{ steps.parser.outputs.parsed_contributor_name }}
          GITHUB_USERNAME: ${{ github.event.issue.user.login }}
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os
          import yaml

          filepath = os.environ['FILEPATH']
          proposed_content = os.environ['PROPOSED_CONTENT']
          contributor_name = os.environ.get('CONTRIBUTOR_NAME', '').strip()
          github_username = os.environ.get('GITHUB_USERNAME', '').strip()

          with open(filepath, 'r') as f:
              existing = f.read()

          # Preserve the YAML frontmatter block, updating contributors if needed
          if existing.startswith('---'):
              parts = existing.split('---', 2)
              frontmatter_text = parts[1]
              meta = yaml.safe_load(frontmatter_text) or {}
          else:
              frontmatter_text = None
              meta = {}

          if contributor_name:
              contributors = meta.get('contributors') or []
              # Avoid adding duplicate entries
              if not any(c.get('github') == github_username for c in contributors):
                  contributors.append({'name': contributor_name, 'github': github_username})
              meta['contributors'] = contributors

          if frontmatter_text is not None:
              # Re-serialise frontmatter, preserving key order (tags, doi, contributors, comments)
              key_order = ['tags', 'doi', 'contributors', 'comments']
              ordered = {k: meta[k] for k in key_order if k in meta}
              ordered.update({k: v for k, v in meta.items() if k not in ordered})
              frontmatter = '---\n' + yaml.dump(ordered, default_flow_style=False, allow_unicode=True) + '---\n'
          else:
              frontmatter = ''

          with open(filepath, 'w') as f:
              f.write(frontmatter + '\n' + proposed_content.strip() + '\n')

          print(f"Updated {filepath}")
          PYEOF

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          commit-message: "${{ github.event.issue.title }}"
          title: "${{ github.event.issue.title }}"
          body: |
            Auto-generated PR applying an edit suggested via issue.

            Suggested by @${{ github.event.issue.user.login }}

            Closes #${{ github.event.issue.number }}
          branch: "edit-page-${{ github.event.issue.number }}"
          delete-branch: true
