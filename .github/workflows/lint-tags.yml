name: Normalise tags

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - '.github/tags.yml'

jobs:
  normalise-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Normalise tags in changed files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python3 scripts/lint_tags.py

      - name: Commit normalised tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No tag changes to commit."
          else
            git commit -m "ci: normalise tags"
            git push
          fi
