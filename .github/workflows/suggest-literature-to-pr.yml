name: Convert suggested literature to PR
on:
  issues:
    types: [opened, edited]

jobs:
    create-contribution:
        if: contains(github.event.issue.labels.*.name, 'literature-suggestion')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Parse issue
              id: parser
              uses: issue-ops/parser@v5.0.0
              with:
                body: ${{ github.event.issue.body }}
                issue-form-template: suggest-literature.yml

            - name: Generate markdown file
              id: generate
              shell: bash
              env:
                DOI: ${{ steps.parser.outputs.parsed_doi }}
                FILEPATH: ${{ steps.parser.outputs.parsed_filepath }}
                TAGS: ${{ steps.parser.outputs.parsed_tags }}
                CONTENT: ${{ steps.parser.outputs.parsed_content }}
                CONTRIBUTOR_NAME: ${{ steps.parser.outputs.parsed_contributor_name }}
                GITHUB_USERNAME: ${{ github.event.issue.user.login }}
              run: |

                FULL_PATH="docs/literature/${FILEPATH}.md"
                # Extract the directory the file needs to go in and make the folder
                DIR_PATH=$(dirname "$FULL_PATH")
                mkdir -p "$DIR_PATH"

                # Normalise tags: match against allowlist (case-insensitive),
                # falling back to Python's str.title() for unrecognised tags.
                if [ -n "$TAGS" ]; then
                    TAGS_LIST=$(python3 << 'PYEOF'
import os

with open('.github/tags.yml') as f:
    allowlist = [line.strip()[2:] for line in f if line.strip().startswith('- ')]

lookup = {t.lower(): t for t in allowlist}
tags_input = os.environ.get('TAGS', '')
for tag in tags_input.split(','):
    tag = tag.strip()
    if tag:
        print('  - ' + lookup.get(tag.lower(), tag.title()))
PYEOF
                    )
                    NORMALIZED_DISPLAY=$(echo "${TAGS_LIST}" | sed 's/^  - //' | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g')
                    TAGS_YAML="tags:
                ${TAGS_LIST}"
                else
                    NORMALIZED_DISPLAY="_none_"
                    TAGS_YAML="tags:"
                fi
                echo "normalized_tags=${NORMALIZED_DISPLAY}" >> "$GITHUB_OUTPUT"

                # Build optional contributors block
                if [ -n "$CONTRIBUTOR_NAME" ]; then
                    CONTRIBUTORS_YAML="contributors:
                  - name: \"${CONTRIBUTOR_NAME}\"
                    github: \"${GITHUB_USERNAME}\""
                else
                    CONTRIBUTORS_YAML=""
                fi

                {
                  echo "---"
                  echo "${TAGS_YAML}"
                  echo "doi: $DOI"
                  if [ -n "$CONTRIBUTORS_YAML" ]; then
                    echo "${CONTRIBUTORS_YAML}"
                  fi
                  echo "comments: true"
                  echo "---"
                  echo ""
                  echo "$CONTENT"
                } > "$FULL_PATH"
            
            - name: Create PR
              uses: peter-evans/create-pull-request@v6
              with:
                base: main
                commit-message: "${{ github.event.issue.title }}"
                title: "${{ github.event.issue.title }}"
                body: |
                    Auto-generated PR for adding the suggested literature.

                    **Tags:** ${{ steps.generate.outputs.normalized_tags }}

                    Suggested by @${{ github.event.issue.user.login }}

                    Closes #${{ github.event.issue.number }}
                branch: "add-suggested-literature-${{ github.event.issue.number }}" 
                delete-branch: true
