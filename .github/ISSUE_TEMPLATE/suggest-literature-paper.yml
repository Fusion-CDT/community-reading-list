name: "Suggest literature: paper"
description: Suggest a journal article or preprint to add to the reading list.
title: ""
labels: ["paper-suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the Fusion CDT Community Reading List!
        Please fill in as much detail as you can below.

  - type: input
    id: doi
    attributes:
      label: DOI
      description: The DOI of the paper, if available.
      placeholder: "e.g. 10.1063/1.2178779"
    validations:
      required: false

  - type: input
    id: filepath
    attributes:
      label: Location and filename
      description: Where in the reading list should this live and what should it be called? Follow the format `<AUTHOR>_<YEAR>_<SHORT-TITLE>`.
      placeholder: "e.g. plasma/MCF/abel_2013_multiscale-gyrokinetics"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags. See the existing tag list for canonical spellings.
      placeholder: "e.g. MCF, gyrokinetics, GS2"
    validations:
      required: false

  - type: textarea
    id: content
    attributes:
      label: Content
      description: Why this is useful and what you'd like to highlight. Please use Markdown and LaTeX for maths (e.g. `$\chi_e$`).
      placeholder: "e.g. Essential review paper for anyone starting in gyrokinetics."
    validations:
      required: true

  - type: input
    id: contributor_name
    attributes:
      label: Your name (optional)
      description: Your full name, to be credited as a contributor to this note.
      placeholder: "e.g. Bailey Cook"
    validations:
      required: false
