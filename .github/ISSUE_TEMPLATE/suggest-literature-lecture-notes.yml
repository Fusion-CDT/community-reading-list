name: "Suggest literature: lecture notes or slides"
description: Suggest a set of lecture notes or slides to add to the reading list.
title: "Add suggested literature: "
labels: ["lecture-notes-suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the Fusion CDT Community Reading List!
        Please fill in as much detail as you can below.

  - type: input
    id: title
    attributes:
      label: Title
      description: The full title of the lecture notes or slides.
      placeholder: "e.g. EPFL Plasma Physics: Introduction & Applications"
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Author(s) (optional)
      description: The author(s) of the lecture notes or slides, if known.
      placeholder: "e.g. Felix Parra Diaz"
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: URL
      description: A link to the notes or slides, if publicly available.
      placeholder: "e.g. https://example.com/notes.pdf"
    validations:
      required: false

  - type: input
    id: filepath
    attributes:
      label: Location and filename
      description: Where in the reading list should this live and what should it be called? Follow the format `<AUTHOR>_<YEAR>_<SHORT-TITLE>`.
      placeholder: "e.g. plasma/MCF/parra_2019_collisional-plasma-physics"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags. See the existing tag list for canonical spellings.
      placeholder: "e.g. MCF, Theory, Plasma Physics"
    validations:
      required: false

  - type: textarea
    id: content
    attributes:
      label: Content
      description: Why this is useful and what you'd like to highlight. Please use Markdown and LaTeX for maths (e.g. `$\chi_e$`).
      placeholder: "e.g. Comprehensive introduction to plasma physics covering MHD and kinetic theory."
    validations:
      required: true

  - type: input
    id: contributor_name
    attributes:
      label: Your name (optional)
      description: Your full name, to be credited as a contributor to this note.
      placeholder: "e.g. Bailey Cook"
    validations:
      required: false
